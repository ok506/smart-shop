<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>商品管理系统 - 登录</title>
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ===== 登录卡片 ===== */
        .login-container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 48px 40px 40px;
            width: 400px;
            max-width: 92%;
            transition: transform 0.3s ease;
        }

        .login-container:hover {
            transform: translateY(-4px);
        }

        /* ===== Logo / 标题区域 ===== */
        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-header .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }

        .login-header h1 {
            font-size: 26px;
            font-weight: 700;
            color: #2d3748;
            letter-spacing: 2px;
        }

        .login-header p {
            color: #718096;
            font-size: 14px;
            margin-top: 6px;
        }

        /* ===== 错误提示 ===== */
        .error-msg {
            background: #fff5f5;
            border: 1px solid #feb2b2;
            color: #c53030;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        /* ===== 表单 ===== */
        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 6px;
        }

        .form-group label .required {
            color: #e53e3e;
            margin-left: 2px;
        }

        .form-group .input-wrapper {
            position: relative;
        }

        .form-group .input-wrapper .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: #a0aec0;
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px 12px 44px;
            font-size: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            background: #f7fafc;
            color: #2d3748;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
            background: #ffffff;
        }

        .form-group input::placeholder {
            color: #a0aec0;
            font-size: 14px;
        }

        /* ===== 记住我 + 忘记密码 ===== */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .form-options label {
            display: flex;
            align-items: center;
            color: #4a5568;
            cursor: pointer;
        }

        .form-options label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            accent-color: #667eea;
            cursor: pointer;
        }

        .form-options a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .form-options a:hover {
            color: #5a67d8;
            text-decoration: underline;
        }

        /* ===== 登录按钮 ===== */
        .btn-login {
            width: 100%;
            padding: 14px;
            font-size: 17px;
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.3s ease;
            letter-spacing: 3px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* ===== 底部版权 ===== */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: #a0aec0;
            border-top: 1px solid #e2e8f0;
            padding-top: 20px;
        }

        .login-footer span {
            color: #667eea;
        }

        /* ===== 响应式适配 ===== */
        @media (max-width: 480px) {
            .login-container {
                padding: 32px 20px 28px;
            }

            .login-header h1 {
                font-size: 22px;
            }

            .form-group input {
                padding: 10px 12px 10px 40px;
                font-size: 14px;
            }

            .btn-login {
                padding: 12px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <!-- 标题 -->
    <div class="login-header">
        <span class="icon">📦</span>
        <h1>商品管理系统</h1>
        <p>请输入账号密码登录后台</p>
    </div>

    <!-- 错误提示 -->
    <div class="error-msg" id="errorMsg" th:if="${param.error}">
        ⚠️ 用户名或密码错误，请重新输入
    </div>

    <!-- 登录表单 -->
    <form method="post" th:action="@{/doLogin}">
        <div class="form-group">
            <label>账号 <span class="required">*</span></label>
            <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input autofocus name="username" placeholder="请输入用户名" required type="text">
            </div>
        </div>

        <div class="form-group">
            <label>密码 <span class="required">*</span></label>
            <div class="input-wrapper">
                <span class="input-icon">🔒</span>
                <input name="password" placeholder="请输入密码" required type="password">
            </div>
        </div>

        <div class="form-options">
            <label>
                <input name="remember-me" type="checkbox"> 记住我
            </label>
            <a href="#">忘记密码？</a>
        </div>

        <button class="btn-login" type="submit">登 录</button>
    </form>

    <div class="login-footer">
        默认账号 <span>admin</span> / 密码 <span>123456</span>
    </div>
</div>

</body>
</html>
